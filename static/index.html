<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信推Kindle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --card: #ffffff;
      --accent: #e8611a;
      --accent-hover: #c9501a;
      --text: #1a1a1a;
      --muted: #777;
      --border: #e0ddd8;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header .logo {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
    }
    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    .form-group {
      margin-bottom: 1.4rem;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    label .hint {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.82rem;
      margin-left: 0.4rem;
    }
    input[type="email"],
    textarea,
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }
    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 1.4rem;
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 0.92rem;
      display: none;
    }
    #result.success {
      background: #edfbf3;
      border: 1.5px solid #5cb85c;
      color: #2d6a2d;
      display: block;
    }
    #result.error {
      background: #fff2f2;
      border: 1.5px solid #e55;
      color: #a00;
      display: block;
    }
    #result .result-title {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    #result ul {
      padding-left: 1.2em;
      margin-top: 0.4rem;
    }
    #result li { margin: 0.2rem 0; }
    #result .warn {
      margin-top: 0.6rem;
      font-size: 0.85rem;
      color: #a06000;
    }

    .info-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.5rem 2rem;
      width: 100%;
      max-width: 560px;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .info-card h2 {
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.8rem;
    }
    .steps { counter-reset: step; padding-left: 0; list-style: none; }
    .steps li {
      counter-increment: step;
      display: flex;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
      align-items: flex-start;
    }
    .steps li::before {
      content: counter(step);
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      min-width: 1.4em;
      height: 1.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      margin-top: 0.05em;
    }
    .sender-email {
      font-family: monospace;
      background: #f0ede8;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--text);
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    footer {
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">📚</div>
    <h1>微信推Kindle</h1>
    <p>把微信公众号文章一键推送到你的 Kindle</p>
  </header>

  <div class="card">
    <form id="pushForm">

      <div class="form-group">
        <label for="kindle_email">
          Kindle 邮箱地址
          <span class="hint">在 Amazon 账户 → 管理内容和设备 中查看</span>
        </label>
        <input
          type="email"
          id="kindle_email"
          name="kindle_email"
          placeholder="yourname_xxxx@kindle.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="urls">
          文章链接
          <span class="hint">每行一个，最多 20 篇</span>
        </label>
        <textarea
          id="urls"
          name="urls"
          placeholder="https://mp.weixin.qq.com/s/xxxxxxxx&#10;https://mp.weixin.qq.com/s/yyyyyyyy"
          required
        ></textarea>
      </div>

      <div class="form-group">
        <label for="book_title">
          自定义书名
          <span class="hint">可选，留空则自动生成</span>
        </label>
        <input
          type="text"
          id="book_title"
          name="book_title"
          placeholder="例：科技周刊 2026-03-28"
        />
      </div>

      <button type="submit" class="btn" id="submitBtn">
        推送到 Kindle
      </button>

      <div id="result"></div>
    </form>
  </div>

  <div class="info-card">
    <h2>使用前需要完成一次设置</h2>
    <ol class="steps">
      <li>
        登录 <strong>Amazon 官网</strong> → 账户 → 管理内容和设备 → 首选项 → 个人文档设置
      </li>
      <li>
        在「已批准的个人文档电子邮件列表」中添加本站发件地址：
        <span class="sender-email" id="senderEmail">加载中...</span>
      </li>
      <li>
        完成后即可正常推送，文章将在 Kindle 联网后自动同步
      </li>
    </ol>
  </div>

  <footer>仅供个人学习使用，请遵守版权法律</footer>

  <script>
    // Load sender email from server config
    fetch('/config')
      .then(r => r.json())
      .then(d => {
        document.getElementById('senderEmail').textContent = d.sender_email || '（管理员未配置）';
      })
      .catch(() => {
        document.getElementById('senderEmail').textContent = '（无法获取）';
      });

    // Persist Kindle email in localStorage
    const emailInput = document.getElementById('kindle_email');
    const stored = localStorage.getItem('kindle_email');
    if (stored) emailInput.value = stored;
    emailInput.addEventListener('change', () => {
      localStorage.setItem('kindle_email', emailInput.value.trim());
    });

    // Form submit
    document.getElementById('pushForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots">正在处理</span>';
      result.style.display = 'none';
      result.className = '';

      const formData = new FormData(e.target);

      try {
        const resp = await fetch('/send', { method: 'POST', body: formData });
        const data = await resp.json();

        if (resp.ok && data.success) {
          result.className = 'success';
          let html = `<div class="result-title">✅ ${data.message}</div>`;
          if (data.articles && data.articles.length > 0) {
            html += '<ul>';
            data.articles.forEach(a => {
              html += `<li>${escapeHtml(a.title)} <span style="color:#999">— ${escapeHtml(a.author)}</span></li>`;
            });
            html += '</ul>';
          }
          if (data.warnings && data.warnings.length > 0) {
            html += `<div class="warn">⚠️ ${data.warnings.join('<br>')}</div>`;
          }
          result.innerHTML = html;
        } else {
          result.className = 'error';
          result.innerHTML = `<div class="result-title">❌ 发送失败</div>${escapeHtml(data.detail || '未知错误')}`;
        }
      } catch (err) {
        result.className = 'error';
        result.innerHTML = `<div class="result-title">❌ 网络错误</div>请稍后重试`;
      }

      result.style.display = '';
      btn.disabled = false;
      btn.textContent = '推送到 Kindle';
    });

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
